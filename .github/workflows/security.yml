name: security

# Secret scanning gate. Backs the "no secrets in git" rule (see docs/security.md).
# Further security gates (CodeQL, vulnerable-package scan, dependency review) are
# added with the CI phase (Phase 9).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so secrets in older commits are caught
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for GitHub *organization* accounts.
          # Free for individual/personal repos like this one.
