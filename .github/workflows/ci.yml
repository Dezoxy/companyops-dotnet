name: ci

# Build, format, and test gate. Runs on every push to main and on PRs.
# The gitleaks secret scan is a separate workflow (security.yml).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast feedback: format + build + the pure-domain unit tests (no Docker).
  build-and-unit:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore
      - name: Vulnerable package scan
        # Free, private-repo-friendly dependency check (NuGet advisory DB). Fails the
        # job if any restored package (incl. transitive) has a known vulnerability.
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          ! grep -q "has the following vulnerable" vulnerable.txt
      - name: Verify formatting
        run: dotnet format --verify-no-changes
      - run: dotnet build --no-restore --configuration Release
      - name: API contract up to date (OpenAPI drift gate)
        # The build regenerates the committed contract (openapi.json) from the code. If the working
        # tree shows ANY change to it — modified, deleted, or regenerated-but-untracked (e.g. a PR
        # deleted the committed file) — the contract drifted. `git status --porcelain` is used over
        # `git diff` because the latter ignores untracked files, so a delete-then-regenerate would
        # slip through. See docs/openapi-contract-plan.md (Phase 7) and ADR 0013.
        run: |
          status="$(git status --porcelain -- openapi.json)"
          if [ -n "$status" ]; then
            echo "::error::openapi.json is out of date with the code (or missing). Run 'dotnet build' and commit the regenerated contract."
            echo "$status"
            git diff -- openapi.json || true
            exit 1
          fi
      - name: Domain unit tests
        run: dotnet test tests/CompanyOps.Domain.Tests --no-build --configuration Release
      - name: Application unit tests
        run: dotnet test tests/CompanyOps.Application.Tests --no-build --configuration Release

  # Heavier: the Testcontainers integration tests (real Postgres, Keycloak, RabbitMQ).
  # GitHub's ubuntu-latest runner has Docker, so Testcontainers works out of the box.
  # Gated on the fast job so a format/build/unit failure fails in seconds.
  integration-tests:
    name: integration tests (Testcontainers)
    needs: build-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Integration tests
        # Retry ONLY transient Testcontainers image-pull failures (registry "502 Bad Gateway" while
        # pulling Postgres/Keycloak/RabbitMQ/Redis before any test runs). A real test failure — a
        # product/test race, ordering bug, or genuine regression — is NOT retried: we inspect the
        # run log and re-run only when it carries the registry/pull-error signature, so a flaky test
        # that happens to pass on a second attempt can't sneak through the gate.
        run: |
          set -o pipefail
          log="$(mktemp)"
          for attempt in 1 2 3; do
            echo "::group::Integration tests (attempt ${attempt}/3)"
            if dotnet test tests/CompanyOps.Api.IntegrationTests --configuration Release 2>&1 | tee "$log"; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -ge 3 ] || ! grep -qiE 'PullImageAsync|received unexpected HTTP status: 5[0-9][0-9]|Bad Gateway|error pulling image|failed to (pull|resolve) image' "$log"; then
              echo "::error::integration tests failed — not a transient image-pull error (or retries exhausted); not retrying"
              exit 1
            fi
            echo "::warning::transient registry image-pull failure on attempt ${attempt}/3 — retrying"
            sleep 20
          done
          exit 1

  # Smoke-test that the Dockerfiles still build (dev compose: API/Worker/FakeExternals). Gated on
  # the fast job. Versioned images are built + pushed to GHCR by release.yml on a published
  # release (ADR 0012) — not here, so PRs never publish.
  docker-build:
    name: docker images
    needs: build-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build images
        run: docker compose -f infra/docker-compose.yml build
      - name: Build the frontend image (nginx-served SPA)
        run: docker build -t companyops-frontend:ci frontend

  # Validate the Phase 11 infrastructure-as-code: Terraform, the prod Compose file, the
  # Ansible playbook, and the shell scripts. Independent of the build/test jobs (none applied).
  iac-validate:
    name: iac validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt + validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate

      - name: ShellCheck infra + container scripts
        run: shellcheck infra/backup/*.sh infra/postgres/initdb/*.sh infra/terraform/*.sh frontend/docker-entrypoint.sh

      - name: Validate prod Compose config
        run: docker compose -f infra/docker-compose.prod.yml config -q
        env:
          GHCR_OWNER: ci
          COMPANYOPS_VERSION: ci
          APP_DOMAIN: app.example.com
          ACME_EMAIL: ci@example.com
          POSTGRES_PASSWORD: ci_dummy_not_a_secret
          KC_DB_PASSWORD: ci_dummy_not_a_secret
          RABBITMQ_PASSWORD: ci_dummy_not_a_secret
          KC_ADMIN_USER: ci
          KC_ADMIN_PASSWORD: ci_dummy_not_a_secret

      - name: Ansible lint
        run: |
          python3 -m venv /tmp/av
          /tmp/av/bin/pip install --quiet 'ansible-lint==26.4.0'
          /tmp/av/bin/ansible-galaxy collection install -r infra/ansible/requirements.yml
          /tmp/av/bin/ansible-lint infra/ansible/playbook.yml

  # Frontend (Angular client) — build + lint + Vitest unit tests. Independent of the .NET jobs.
  frontend:
    name: frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm install`, not `npm ci`: the macOS-generated lock omits Linux-only optional deps
      # (e.g. @emnapi/* pulled in by the Linux native build packages), which `npm ci` rejects.
      # install resolves the runner's platform deps from the committed lock.
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npx ng build
      - name: Lint
        run: npx ng lint
      - name: Unit tests
        run: npx ng test --watch=false
