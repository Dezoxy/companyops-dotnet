name: ci

# Build, format, and test gate. Runs on every push to main and on PRs.
# The gitleaks secret scan is a separate workflow (security.yml).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast feedback: format + build + the pure-domain unit tests (no Docker).
  build-and-unit:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore
      - name: Vulnerable package scan
        # Free, private-repo-friendly dependency check (NuGet advisory DB). Fails the
        # job if any restored package (incl. transitive) has a known vulnerability.
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          ! grep -q "has the following vulnerable" vulnerable.txt
      - name: Verify formatting
        run: dotnet format --verify-no-changes
      - run: dotnet build --no-restore --configuration Release
      - name: Domain unit tests
        run: dotnet test tests/CompanyOps.Domain.Tests --no-build --configuration Release
      - name: Application unit tests
        run: dotnet test tests/CompanyOps.Application.Tests --no-build --configuration Release

  # Heavier: the Testcontainers integration tests (real Postgres, Keycloak, RabbitMQ).
  # GitHub's ubuntu-latest runner has Docker, so Testcontainers works out of the box.
  # Gated on the fast job so a format/build/unit failure fails in seconds.
  integration-tests:
    name: integration tests (Testcontainers)
    needs: build-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Integration tests
        run: dotnet test tests/CompanyOps.Api.IntegrationTests --configuration Release

  # Validate the Dockerfiles actually build (compose builds API/Worker/FakeExternals).
  # Gated on the fast job. Pushing to a registry (GHCR) is a guarded follow-up — see the
  # commented step — kept off by default so PRs don't publish images.
  docker-build:
    name: docker images
    needs: build-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build images
        run: docker compose -f infra/docker-compose.yml build
      # - name: Push to GHCR (main only)
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   run: |
      #     echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      #     docker compose -f infra/docker-compose.yml push
      #   # requires: permissions: packages: write, and image: names retagged to ghcr.io/<owner>/…
