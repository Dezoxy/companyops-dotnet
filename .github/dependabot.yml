version: 2
updates:
  # NuGet dependencies across the solution (one ecosystem entry covers all .csproj).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch the routine framework/test bumps into one PR to cut noise.
      microsoft-and-test:
        patterns:
          - "Microsoft.*"
          - "xunit*"
          - "coverlet*"
          - "Testcontainers*"

  # Keep the GitHub Actions we pin (checkout, setup-dotnet, cache, codeql) current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
