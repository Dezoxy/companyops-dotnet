# CompanyOps login theme — restyles Keycloak's keycloak.v2 login to match the Angular client's
# "Precision Enterprise" dark theme (ADR 0010). CSS-ONLY override: the page layout + templates
# come from the parent (keycloak.v2), so this survives Keycloak upgrades (no copied .ftl).
#
# `styles` REPLACES the parent's list, so we re-list the parent's own stylesheet (css/styles.css,
# resolved from keycloak.v2 by theme fallback) and append ours last so it wins.
#
# Activate by setting the realm's login theme to "companyops" (Realm settings → Themes, or the
# realm import's "loginTheme"). The theme dir is mounted into the container at
# /opt/keycloak/themes (see infra/docker-compose.prod.yml).
parent=keycloak.v2
import=common/keycloak
styles=css/styles.css css/companyops.css
