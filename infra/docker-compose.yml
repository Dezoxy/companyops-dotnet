# Local dev backing services. Postgres (Phase 1) + Keycloak (Phase 3). The full
# app stack (API, Worker, Redis, RabbitMQ) is assembled in Phase 7. Credentials
# here are local-only throwaways and must match src/CompanyOps.Api/appsettings.Development.json.
services:
  postgres:
    image: postgres:18
    container_name: companyops-postgres
    environment:
      POSTGRES_DB: companyops
      POSTGRES_USER: companyops
      POSTGRES_PASSWORD: localdev_only_not_a_secret
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (data lands in a
      # version-specific subdir), NOT /var/lib/postgresql/data — the old path
      # makes the 18 image exit 1 on startup.
      - companyops-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companyops -d companyops"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: companyops-keycloak
    # start-dev = dev mode (no HTTPS requirement, in-memory friendly). --import-realm
    # imports any realm JSON mounted under /opt/keycloak/data/import on first boot.
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: localdev_only_not_a_secret
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-companyops.json:/opt/keycloak/data/import/realm-companyops.json:ro

  rabbitmq:
    image: rabbitmq:4-management
    container_name: companyops-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: companyops
      RABBITMQ_DEFAULT_PASS: localdev_only_not_a_secret
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  companyops-pgdata:
