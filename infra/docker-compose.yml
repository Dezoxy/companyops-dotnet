# Full local stack (Phase 7): `docker compose -f infra/docker-compose.yml up --build`
# brings up the backing services (Postgres, Keycloak, RabbitMQ, Redis), the mock
# external systems, a one-shot migrator, the API, and the Worker — the whole system.
# Credentials here are local-only throwaways. Build context is the repo root (..).
name: companyops

services:
  postgres:
    image: postgres:18
    container_name: companyops-postgres
    environment:
      POSTGRES_DB: companyops
      POSTGRES_USER: companyops
      POSTGRES_PASSWORD: localdev_only_not_a_secret
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (data lands in a
      # version-specific subdir), NOT /var/lib/postgresql/data.
      - companyops-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companyops -d companyops"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: companyops-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: localdev_only_not_a_secret
      KC_HEALTH_ENABLED: "true"
      # Pin the hostname so the token issuer is stable — http://keycloak:8080/realms/…
      # — for both in-network callers (the API validates against it) and host callers
      # via the published port. Backchannel stays dynamic so internal calls resolve.
      KC_HOSTNAME: http://keycloak:8080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./keycloak/realm-companyops.json:/opt/keycloak/data/import/realm-companyops.json:ro

  rabbitmq:
    image: rabbitmq:4-management
    container_name: companyops-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: companyops
      RABBITMQ_DEFAULT_PASS: localdev_only_not_a_secret
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      # check_port_connectivity confirms the AMQP listener is actually accepting,
      # not just that the node is up (ping) — avoids a connect-refused startup race.
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:8
    container_name: companyops-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  fakeexternals:
    build:
      context: ..
      dockerfile: src/CompanyOps.FakeExternals/Dockerfile
    image: companyops-fakeexternals:local
    container_name: companyops-fakeexternals
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "127.0.0.1:5090:8080"

  # One-shot: applies EF migrations and exits. The api/worker wait for it to complete,
  # so the app processes never self-migrate and startup ordering is explicit. It also
  # builds the shared API image that the `api` service reuses.
  migrator:
    build:
      context: ..
      dockerfile: src/CompanyOps.Api/Dockerfile
    image: companyops-api:local
    container_name: companyops-migrator
    command: ["--migrate"]
    environment:
      ConnectionStrings__CompanyOps: Host=postgres;Port=5432;Database=companyops;Username=companyops;Password=localdev_only_not_a_secret
      Keycloak__Authority: http://keycloak:8080/realms/companyops
      Keycloak__Audience: companyops-api
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: companyops
      RabbitMq__Password: localdev_only_not_a_secret
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: companyops-api:local # built by the migrator service
    container_name: companyops-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CompanyOps: Host=postgres;Port=5432;Database=companyops;Username=companyops;Password=localdev_only_not_a_secret
      Keycloak__Authority: http://keycloak:8080/realms/companyops
      Keycloak__Audience: companyops-api
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: companyops
      RabbitMq__Password: localdev_only_not_a_secret
    ports:
      - "127.0.0.1:5080:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: src/CompanyOps.Worker/Dockerfile
    image: companyops-worker:local
    container_name: companyops-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__CompanyOps: Host=postgres;Port=5432;Database=companyops;Username=companyops;Password=localdev_only_not_a_secret
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: companyops
      RabbitMq__Password: localdev_only_not_a_secret
      ExternalSystems__FinanceBaseUrl: http://fakeexternals:8080
      ExternalSystems__InventoryBaseUrl: http://fakeexternals:8080
    depends_on:
      migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      fakeexternals:
        condition: service_started

volumes:
  companyops-pgdata:
