---
# Provisions a fresh Ubuntu VM and deploys the CompanyOps production stack
# (docker-compose.prod.yml). Cloud-agnostic — point the inventory at any Ubuntu 24.04 host
# (Terraform-provisioned, homelab, or hand-rolled). Secrets come from group_vars (use
# ansible-vault); see group_vars/all.yml.example. Run:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook -i inventory.ini playbook.yml --ask-vault-pass
- name: Deploy the CompanyOps production stack
  hosts: companyops
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/companyops
    repo_url: https://github.com/Dezoxy/companyops-dotnet.git
    # Which repo ref to put on the VM (compose.prod.yml, realm, initdb, backup script). The
    # release workflow overrides this with the release tag so these files match the images.
    repo_ref: main
    backup_hour: "2"
    backup_minute: "30"
    # Required (define in group_vars/all.yml via ansible-vault, or pass via --extra-vars from the
    #   release workflow — no defaults on purpose):
    #   ghcr_owner, companyops_version, app_domain, acme_email,
    #   postgres_password, kc_db_password, rabbitmq_password, kc_admin_user, kc_admin_password
    # Optional: ghcr_pull_username + ghcr_pull_token (private packages), otel_exporter_otlp_endpoint

  tasks:
    - name: Install apt prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - ufw
        state: present
        update_cache: true

    - name: Create the apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add the Docker apt GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add the Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine and the Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker is running and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Allow SSH through the firewall
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTP and HTTPS through the firewall
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"

    - name: Enable the firewall (default-deny incoming)
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Clone or update the repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_ref }}"
        # force: reset to repo_ref even if tracked files were modified in place. The "Pin the realm
        # redirect URIs" task below edits a tracked file (realm-companyops.prod.json), so without
        # this a re-run fails with "Local modifications exist". The untracked rendered .env is kept
        # (force resets tracked files only); the realm is re-pinned right after.
        force: true

    - name: Render the production .env (secrets from vault)
      ansible.builtin.template:
        src: env.j2
        dest: "{{ app_dir }}/infra/.env"
        mode: "0600"

    - name: Pin the realm redirect URIs / web origins to the app domain
      ansible.builtin.replace:
        path: "{{ app_dir }}/infra/keycloak/realm-companyops.prod.json"
        regexp: app\.REPLACE_ME\.example
        replace: "{{ app_domain }}"

    - name: Schedule the nightly database backup
      ansible.builtin.cron:
        name: companyops-pg-backup
        minute: "{{ backup_minute }}"
        hour: "{{ backup_hour }}"
        job: "{{ app_dir }}/infra/backup/pg-backup.sh >> /var/log/companyops-backup.log 2>&1"

    # Authenticate to GHCR so the VM can pull the release images (ADR 0012). Skipped when no
    # token is set — i.e. the packages are public and need no auth.
    - name: Log in to GHCR (private packages only)
      community.docker.docker_login:
        registry: ghcr.io
        username: "{{ ghcr_pull_username }}"
        password: "{{ ghcr_pull_token }}"
      when: ghcr_pull_token | default('') | length > 0

    - name: Pull the release images and (re)start the production stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}/infra"
        files:
          - docker-compose.prod.yml
        env_files:
          - .env
        pull: always
        state: present

    # The realm's loginTheme/displayName only apply on a FRESH import — `start --import-realm` skips
    # a realm that already exists. So a rollout against an already-provisioned Keycloak mounts the
    # theme CSS but leaves the realm on the default login theme. Apply it idempotently via the admin
    # API: read the realm, patch ONLY loginTheme + displayName (every other setting is preserved),
    # PUT it back, and only when it isn't already set. Best-effort (block/rescue) so a first-ever
    # deploy — self-signed TLS before Let's Encrypt issues — doesn't fail the rollout: a fresh realm
    # already gets the theme from the import, and a re-run applies it once HTTPS is live.
    - name: Apply the companyops realm login theme (idempotent, admin API)
      block:
        - name: Wait for Keycloak to be reachable
          ansible.builtin.uri:
            url: "https://{{ app_domain }}/auth/realms/master/.well-known/openid-configuration"
            status_code: 200
          register: kc_ready
          retries: 30
          delay: 5
          until: kc_ready.status == 200

        - name: Get a Keycloak admin token
          ansible.builtin.uri:
            url: "https://{{ app_domain }}/auth/realms/master/protocol/openid-connect/token"
            method: POST
            body_format: form-urlencoded
            body:
              grant_type: password
              client_id: admin-cli
              username: "{{ kc_admin_user }}"
              password: "{{ kc_admin_password }}"
          register: kc_token
          no_log: true

        - name: Read the current companyops realm settings
          ansible.builtin.uri:
            url: "https://{{ app_domain }}/auth/admin/realms/companyops"
            headers:
              Authorization: "Bearer {{ kc_token.json.access_token }}"
          register: kc_realm
          no_log: true

        - name: Set loginTheme + displayName on the realm (only when changed)
          ansible.builtin.uri:
            url: "https://{{ app_domain }}/auth/admin/realms/companyops"
            method: PUT
            headers:
              Authorization: "Bearer {{ kc_token.json.access_token }}"
            body_format: json
            body: "{{ kc_realm.json | combine({'loginTheme': 'companyops', 'displayName': 'CompanyOps'}) }}"
            status_code: 204
          when: >-
            (kc_realm.json.loginTheme | default('')) != 'companyops'
            or (kc_realm.json.displayName | default('')) != 'CompanyOps'
          no_log: true
      rescue:
        - name: Warn that the login theme could not be applied via the admin API
          ansible.builtin.debug:
            msg: >-
              Could not apply loginTheme via the Keycloak admin API (Keycloak unreachable, or HTTPS
              not ready on a first deploy). A freshly imported realm already has it; re-run the
              playbook once Keycloak is reachable over HTTPS to apply it to an existing realm.
