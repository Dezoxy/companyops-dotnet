# Serves the Angular SPA. /api is NOT handled here — the Traefik edge routes Host(APP_DOMAIN) &&
# PathPrefix(/api) to the API (stripping /api) before it ever reaches this container, so nginx
# only serves the static client and its client-side routing fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets — long cache, immutable (the filename changes on every build).
    location ~* \.(?:js|css|woff2?|ttf|eot|png|svg|jpe?g|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html is never cached, so a new deploy is picked up on the next load.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
